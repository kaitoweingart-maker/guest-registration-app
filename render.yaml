services:
  - type: web
    name: guest-registration-app
    runtime: node
    plan: free
    buildCommand: npm install && npm run render-build && npm run seed
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: guest-data
      mountPath: /data
      sizeGB: 1
